<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тренировка 1 час</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(180deg, #ff7a00, #ff9a2f);
    color: white;
    scroll-behavior: smooth;
}

/* Контейнер */
.container {
    width: 90%;
    margin: auto;
    padding: 40px 0;
}

/* Заголовок */
h1 {
    text-align: center;
    font-size: 40px;
    margin-bottom: 20px;
}

/* Подзаголовок */
p {
    text-align: center;
    color: #aee0ff;
    margin-bottom: 50px;
}

/* Карточки */
.cards {
    display: flex;
    flex-direction: column;
    gap: 30px;
}

/* Блок */
.card {
    padding: 40px;
    border-radius: 20px;
    border: 2px solid transparent;
    transition: 0.4s;
    position: relative;
    cursor: pointer;
}

/* ХОВЕР ЭФФЕКТ 🔥 */
.card:hover {
    transform: scale(1.05);
    border: 2px solid white;
    background: rgba(255,255,255,0.1);
}

/* Эмодзи */
.emoji {
    font-size: 40px;
    margin-bottom: 10px;
}

/* Заголовок блока */
.card h2 {
    margin-bottom: 10px;
}

/* Длинный сайт */
.spacer {
    height: 200px;
}
</style>
</head>

<body>

<div class="container">

<h1>💪 План тренировки</h1>
<p>Эстетичный 1-часовой план прокачки</p>

<div class="cards">

<div class="card">
    <div class="emoji">🔥</div>
    <h2>Разминка — 10 минут</h2>
    <p>Прыжки, растяжка, лёгкий бег</p>
</div>

<div class="card">
    <div class="emoji">🏃</div>
    <h2>Кардио — 15 минут</h2>
    <p>Бег или скакалка</p>
</div>

<div class="card">
    <div class="emoji">💪</div>
    <h2>Силовая — 20 минут</h2>
    <p>Отжимания, пресс, приседания</p>
</div>

<div class="card">
    <div class="emoji">🧘</div>
    <h2>Заминка — 10 минут</h2>
    <p>Растяжка и расслабление</p>
</div>

<div class="card">
    <div class="emoji">🚀</div>
    <h2>Фокус — 5 минут</h2>
    <p>Дыхание и концентрация</p>
</div>

</div>

<div class="spacer"></div>
<div class="spacer"></div>

</div>

</body>
</html>
